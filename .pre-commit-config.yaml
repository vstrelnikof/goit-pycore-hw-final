# Git hooks (аналог Husky): перевірки перед commit та push.
# Документація: docs/development.md

default_stages: [commit, push]

repos:
  # Перевірки перед комітом: лінт і стиль (використовується ruff з venv)
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check . --fix
        language: system
        stages: [commit]
      - id: ruff-format
        name: ruff format
        entry: ruff format .
        language: system
        stages: [commit]

  # Перед push обов'язково проходять тести — push без зелених тестів заблоковано
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -v --tb=short
        language: system
        stages: [push]
        pass_filenames: false
        always_run: true
